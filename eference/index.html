<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaw Talent – Reference Check Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f6f7;color:#404040}
  .header{background:white;border-bottom:3px solid #29ABE2;padding:14px 36px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:16px}
  .header-logo{height:46px}
  .header-divider{border-left:1px solid #e2e8f0;padding-left:16px}
  .header-title{font-size:15px;font-weight:700;color:#404040}
  .header-sub{font-size:12px;color:#94a3b8}
  .container{max-width:1140px;margin:0 auto;padding:28px 24px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .card{background:white;border-radius:10px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:18px}
  .step-label{font-size:14px;font-weight:700;color:#404040;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .step-num{width:26px;height:26px;background:#29ABE2;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0}
  textarea,input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;line-height:1.6;background:#fafbfc;color:#404040;outline:none;transition:border-color .15s}
  textarea{resize:vertical}
  textarea:focus,input:focus{border-color:#29ABE2}
  label{font-size:12px;font-weight:600;color:#6B6B6B;display:block;margin-bottom:5px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0 10px}
  .divider-line{flex:1;height:1px;background:#e2e8f0}
  .divider-text{font-size:11px;color:#94a3b8;font-weight:600}
  .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;color:#dc2626;font-size:13px;margin-bottom:12px}
  .btn{width:100%;padding:15px 24px;font-size:14px;font-weight:700;border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
  .btn-blue{background:#29ABE2;color:white}
  .btn-blue:hover{background:#1a9fd4}
  .btn-blue:disabled{background:#cbd5e1;cursor:not-allowed}
  .placeholder-panel{background:white;border-radius:10px;padding:48px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;text-align:center}
  .result-panel{background:white;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid #e2e8f0}
  .tab{flex:1;padding:12px 16px;border:none;background:none;font-size:13px;font-weight:700;cursor:pointer;color:#64748b;border-bottom:2.5px solid transparent}
  .tab.active{color:#29ABE2;border-bottom-color:#29ABE2}
  .tab-new{padding:12px 16px;border:none;background:none;font-size:13px;color:#94a3b8;cursor:pointer}
  .preview-body{padding:16px 22px;max-height:600px;overflow-y:auto}
  .pdf-body{padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;min-height:200px;justify-content:center}
  .sec-header{font-size:11px;font-weight:700;color:#29ABE2;letter-spacing:.05em;margin-bottom:6px;padding-bottom:4px;border-bottom:2px solid #29ABE2;margin-top:14px}
  .q-label{font-size:12px;font-weight:600;color:#404040;margin-bottom:4px}
  .q-answer{font-size:12.5px;color:#374151;line-height:1.6;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;background:white;width:100%;font-family:inherit;resize:vertical}
  .q-answer:focus{border-color:#29ABE2;outline:none}
  .strength-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .strength-num{font-size:13px;font-weight:700;color:#29ABE2;width:18px}
  .meta-box{background:#eef8fd;border-radius:7px;padding:10px 14px;margin-bottom:14px;border-left:3px solid #29ABE2;font-size:13px}
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px}
  .meta-row{display:flex;gap:8px}
  .meta-lbl{font-weight:700;min-width:90px;color:#404040}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:bounce 1.2s ease-in-out infinite}
  .loading-dots{display:inline-flex;gap:4px;align-items:center}
  .dropzone{border:2px dashed #cbd5e1;border-radius:10px;padding:24px 20px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .15s}
  .dropzone:hover,.dropzone.drag{border-color:#29ABE2;background:#f0f9ff}
</style>
</head>

// Set today's date
document.getElementById("refDate").value = new Date().toISOString().slice(0,10);

// Dropzone
function handleDragOver(e){ e.preventDefault(); document.getElementById("dropzone").classList.add("drag"); }
function handleDragLeave(){ document.getElementById("dropzone").classList.remove("drag"); }
function handleDrop(e){ e.preventDefault(); document.getElementById("dropzone").classList.remove("drag"); const f=e.dataTransfer.files[0]; if(f) processFile(f); }
function handleFile(e){ const f=e.target.files[0]; if(f) processFile(f); }

async function processFile(file) {
  const dz = document.getElementById("dz-content");
  dz.innerHTML = `<div class="loading-dots"><span class="dot" style="background:#29ABE2;animation-delay:0s"></span><span class="dot" style="background:#29ABE2;animation-delay:.2s"></span><span class="dot" style="background:#29ABE2;animation-delay:.4s"></span></div><div style="font-size:13px;color:#64748b;margin-top:8px">Reading transcript...</div>`;
  try {
    document.getElementById("transcript").value = await file.text();
    dz.innerHTML = `<div style="font-size:26px">✅</div><div style="font-size:13px;font-weight:600;color:#404040;margin-top:4px">${file.name}</div><div style="font-size:12px;color:#94a3b8">Click to replace</div>`;
  } catch(e) {
    dz.innerHTML = `<div style="font-size:34px">📄</div><div style="font-size:14px;font-weight:600">Drop transcript here</div>`;
    showError("Could not read file: " + e.message);
  }
}

async function generate() {
  const transcript = document.getElementById("transcript").value.trim();
  if (!transcript) { showError("Please upload or paste a transcript first."); return; }
  clearError();

  currentMeta = {
    candidateName: document.getElementById("candidateName").value.trim(),
    roleTitle: document.getElementById("roleTitle").value.trim(),
    refereeName: document.getElementById("refereeName").value.trim(),
    refereeTitle: document.getElementById("refereeTitle").value.trim(),
    refereeCompany: document.getElementById("refereeCompany").value.trim(),
    refDate: document.getElementById("refDate").value
  };

  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="loading-dots"><span class="dot" style="background:white;animation-delay:0s"></span><span class="dot" style="background:white;animation-delay:.2s"></span><span class="dot" style="background:white;animation-delay:.4s"></span></span> Parsing transcript...`;

  document.getElementById("rightPanel").innerHTML = `<div class="placeholder-panel"><div class="loading-dots" style="margin-bottom:16px"><span class="dot" style="background:#29ABE2;animation-delay:0s"></span><span class="dot" style="background:#29ABE2;animation-delay:.2s"></span><span class="dot" style="background:#29ABE2;animation-delay:.4s"></span></div><div style="color:#94a3b8;font-size:14px">Parsing transcript and structuring responses...</div></div>`;

  const ctx = Object.entries(currentMeta).filter(([,v])=>v).map(([k,v])=>`${k}: ${v}`).join("\n");
  const userMsg = (ctx ? ctx + "\n\n" : "") + "Reference Check Transcript:\n" + transcript;

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: [{role:"user",content:userMsg}], max_tokens: 2000 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "API error " + res.status);
    const text = (data.content||[]).map(b=>b.text||"").join("").trim();
    const clean = text.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
    currentResult = JSON.parse(clean);
    renderResult();
  } catch(e) {
    showError("Error: " + e.message);
    document.getElementById("rightPanel").innerHTML = `<div class="placeholder-panel"><div style="font-size:44px;margin-bottom:16px">❌</div><div style="color:#94a3b8;font-size:14px">${e.message}</div></div>`;
  }

  btn.disabled = false;
  btn.innerHTML = "Generate Reference Check →";
}

const SECTIONS = [
  {key:"q_relationship",sec:1,title:"Professional Relationship",q:"How do you know the candidate, and how long have you worked together?"},
  {key:"q_role_overview",sec:2,title:"Role Overview",q:"What role did they hold within your organisation, and what were their core responsibilities?"},
  {key:"q_performance",sec:3,title:"Performance & Capabilities",q:"How would you describe the candidate's performance in their role?"},
  {key:"q_examples",sec:3,title:null,q:"Can you provide specific examples of technical or project success?"},
  {key:"q_leadership",sec:4,title:"Leadership & Collaboration",q:"Please describe how they operate in a team environment."},
  {key:"q_client_facing",sec:5,title:"Client-Facing Skills",q:"Has the candidate represented your organisation to clients or external partners?"},
  {key:"q_working_style",sec:6,title:"Working Style",q:"How does the individual approach work under pressure?"},
  {key:"q_character",sec:7,title:"Character & Integrity",q:"How would you describe their work ethic and character?"},
  {key:"q_environment",sec:9,title:"Ideal Environment",q:"What type of company, culture, or role would this candidate thrive in?"},
  {key:"q_future",sec:10,title:"Future Employment",q:"Would you work with or hire this person again in the future?"},
  {key:"q_final",sec:11,title:"Final Comments",q:"Is there anything else valuable for a future employer to know?"},
];

function renderResult() {
  const r = currentResult;
  const m = currentMeta;

  const sectionsHtml = SECTIONS.map(s => `
    ${s.title ? `<div class="sec-header">${s.sec}. ${s.title.toUpperCase()}</div>` : ""}
    <div class="q-label">${s.q}</div>
    <textarea class="q-answer" rows="3" data-key="${s.key}" onchange="updateResult('${s.key}',this.value)">${r[s.key]||""}</textarea>
  `).join("");

  const strengthsHtml = ["q_strength_1","q_strength_2","q_strength_3"].map((k,i)=>`
    <div class="strength-row">
      <span class="strength-num">${i+1}.</span>
      <input value="${r[k]||""}" data-key="${k}" onchange="updateResult('${k}',this.value)" style="flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12.5px;font-family:inherit;color:#374151;outline:none;background:white" onfocus="this.style.borderColor='#29ABE2'" onblur="this.style.borderColor='#e2e8f0'">
    </div>`).join("");

  document.getElementById("rightPanel").innerHTML = `
    <div class="result-panel">
      <div class="tabs">
        <button class="tab active" id="tab-preview" onclick="switchTab('preview')">Preview</button>
        <button class="tab" id="tab-pdf" onclick="switchTab('pdf')">⬇ Download PDF</button>
        <button class="tab-new" onclick="resetTool()">New</button>
      </div>
      <div id="tab-content-preview" class="preview-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-size:18px;font-weight:700;color:#404040">Reference Check${m.candidateName?" — "+m.candidateName:""}</div>
            <div style="font-size:12px;font-weight:700;color:#29ABE2;margin-top:2px">Confidential</div>
          </div>
          <img src="data:image/jpeg;base64,${LOGO_B64}" style="height:36px">
        </div>
        <div class="meta-box">
          <div class="meta-grid">
            <div class="meta-row"><span class="meta-lbl">Candidate:</span><span>${m.candidateName||""}</span></div>
            <div class="meta-row"><span class="meta-lbl" style="min-width:110px">Referee:</span><span>${m.refereeName||""}</span></div>
            <div class="meta-row"><span class="meta-lbl">Role:</span><span>${m.roleTitle||""}</span></div>
            <div class="meta-row"><span class="meta-lbl" style="min-width:110px">Referee Title:</span><span>${m.refereeTitle||""}</span></div>
            <div class="meta-row"><span class="meta-lbl">Date:</span><span>${m.refDate||""}</span></div>
            <div class="meta-row"><span class="meta-lbl" style="min-width:110px">Company:</span><span>${m.refereeCompany||""}</span></div>
          </div>
        </div>
        ${sectionsHtml}
        <div class="sec-header">8. TOP STRENGTHS</div>
        <div class="q-label" style="margin-bottom:6px">What three qualities or skills best define this candidate?</div>
        ${strengthsHtml}
      </div>
      <div id="tab-content-pdf" style="display:none" class="pdf-body">
        <div style="font-size:13px;color:#64748b;text-align:center">Click to generate a downloadable PDF</div>
        <button class="btn btn-blue" style="width:auto;padding:12px 32px" onclick="buildPdf()">Build PDF</button>
        <div id="pdf-status"></div>
      </div>
    </div>`;
}

function switchTab(tab){
  document.getElementById("tab-preview").classList.toggle("active",tab==="preview");
  document.getElementById("tab-pdf").classList.toggle("active",tab==="pdf");
  document.getElementById("tab-content-preview").style.display=tab==="preview"?"block":"none";
  document.getElementById("tab-content-pdf").style.display=tab==="pdf"?"flex":"none";
}

function updateResult(key,val){ if(currentResult) currentResult[key]=val; }

function resetTool(){
  currentResult=null;
  document.getElementById("transcript").value="";
  document.getElementById("rightPanel").innerHTML=`<div class="placeholder-panel"><div style="font-size:44px;margin-bottom:16px">📋</div><div style="color:#94a3b8;font-size:14px;line-height:1.7">Upload or paste a reference call transcript<br>and click Generate to preview</div></div>`;
  clearError();
}

let builtDoc = null;

async function buildPdf(){
  const status = document.getElementById("pdf-status");
  status.textContent = "Building PDF...";
  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");
  const W=210,H=297,ml=16,mr=16,cw=W-ml-mr;
  const blue=[41,171,226],dark=[64,64,64],mid=[107,107,107];
  const lh=4.3;
  const r=currentResult, m=currentMeta;
  let y=14;

  function s(str){ return str ? String(str).replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/[\u2013\u2014]/g," - ").replace(/\u2026/g,"...").replace(/[^\x20-\x7E\n]/g,"") || "-" : "-"; }
  function np(need){ if(y+need>H-18){ pdf.addPage(); y=14; } }
  function hd(num,title){ y+=2; np(14); pdf.setFont("helvetica","bold"); pdf.setFontSize(10); pdf.setTextColor(...blue); pdf.text(num+".  "+title,ml,y); y+=1.5; pdf.setDrawColor(...blue); pdf.setLineWidth(0.5); pdf.line(ml,y,W-mr,y); y+=4; }
  function qa(question,answer){ pdf.setFont("helvetica","bold"); pdf.setFontSize(8.5); pdf.setTextColor(...dark); const ql=pdf.splitTextToSize(s(question),cw); np(ql.length*lh+6); pdf.text(ql,ml,y); y+=ql.length*lh+1.5; pdf.setFont("helvetica","normal"); pdf.setFontSize(9); pdf.setTextColor(...mid); const al=pdf.splitTextToSize(s(answer||"-"),cw); np(al.length*lh+4); pdf.text(al,ml,y); y+=al.length*lh+3.5; }

  y=22; pdf.setFont("helvetica","bold"); pdf.setFontSize(17); pdf.setTextColor(...dark);
  pdf.text(s("Reference Check - "+(m.candidateName||"")),ml,y); y+=5;
  pdf.setFont("helvetica","bold"); pdf.setFontSize(9); pdf.setTextColor(...blue);
  pdf.text("Confidential",ml,y); y+=8;
  if(y<40) y=40;

  const boxH=22;
  pdf.setFillColor(238,248,253); pdf.rect(ml,y,cw,boxH,"F");
  pdf.setFillColor(...blue); pdf.rect(ml,y,2.5,boxH,"F");
  const c1=ml+6,v1=ml+32,c2=ml+cw/2+4,v2=c2+38;
  let my=y+5.5;
  pdf.setFontSize(8.5);
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Candidate:",c1,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.candidateName),v1,my);
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Referee:",c2,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.refereeName),v2,my); my+=6.5;
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Role:",c1,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.roleTitle),v1,my);
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Referee Title:",c2,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.refereeTitle),v2,my); my+=6.5;
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Date:",c1,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.refDate),v1,my);
  pdf.setFont("helvetica","bold"); pdf.setTextColor(...dark); pdf.text("Referee Company:",c2,my); pdf.setFont("helvetica","normal"); pdf.setTextColor(...mid); pdf.text(s(m.refereeCompany),v2,my);
  y+=boxH+6;

  hd(1,"Professional Relationship"); qa("How do you know the candidate, and how long have you worked together?",r.q_relationship);
  hd(2,"Role Overview"); qa("What role did they hold within your organisation, and what were their core responsibilities?",r.q_role_overview);
  hd(3,"Performance and Capabilities"); qa("How would you describe the candidate's performance in their role?",r.q_performance); qa("Can you provide specific examples of technical or project success?",r.q_examples);
  hd(4,"Leadership and Collaboration"); qa("Please describe how they operate in a team environment.",r.q_leadership);
  hd(5,"Client-Facing Skills"); qa("Has the candidate represented your organisation to clients or external partners?",r.q_client_facing);
  hd(6,"Working Style"); qa("How does the individual approach work under pressure?",r.q_working_style);
  hd(7,"Character and Integrity"); qa("How would you describe their work ethic and character?",r.q_character);
  hd(8,"Top Strengths");
  pdf.setFont("helvetica","bold"); pdf.setFontSize(8.5); pdf.setTextColor(...dark); pdf.text("What three qualities or skills best define this candidate?",ml,y); y+=lh+1.5;
  pdf.setFont("helvetica","normal"); pdf.setFontSize(9); pdf.setTextColor(...mid);
  [r.q_strength_1,r.q_strength_2,r.q_strength_3].forEach((st,i)=>{ if(st){ const sl=pdf.splitTextToSize((i+1)+". "+s(st),cw); np(sl.length*lh+2); pdf.text(sl,ml,y); y+=sl.length*lh+1.5; } }); y+=1;
  hd(9,"Ideal Environment"); qa("What type of company, culture, or role would this candidate thrive in?",r.q_environment);
  hd(10,"Future Employment"); qa("Would you work with or hire this person again in the future?",r.q_future);
  hd(11,"Final Comments"); qa("Is there anything else valuable for a future employer to know?",r.q_final);

  const tp=pdf.internal.getNumberOfPages();
  for(let p=1;p<=tp;p++){
    pdf.setPage(p);
    if(p===1){ try{ pdf.addImage("data:image/jpeg;base64,"+LOGO_B64,"JPEG",W-mr-36,5,36,26); }catch(e){} }
    pdf.setDrawColor(210,210,210); pdf.setLineWidth(0.3); pdf.line(ml,H-12,W-mr,H-12);
    pdf.setFont("helvetica","bold"); pdf.setFontSize(7); pdf.setTextColor(...blue); pdf.text("CONFIDENTIAL",ml,H-7);
    pdf.setFont("helvetica","normal"); pdf.setFontSize(7); pdf.setTextColor(170,170,170); pdf.text("Shaw Talent  |  Reference Check",W/2,H-7,{align:"center"}); pdf.text("Page "+p+" of "+tp,W-mr,H-7,{align:"right"});
  }

  builtDoc = pdf;
  status.innerHTML = `<span style="color:#22c55e;font-weight:600">✅ PDF ready</span>`;
  const btn = document.createElement("button");
  btn.className = "btn btn-blue";
  btn.style.cssText = "width:100%;margin-top:8px";
  btn.textContent = "⬇ Save PDF to Desktop";
  btn.onclick = () => builtDoc.save((m.candidateName||"Reference").replace(/\s+/g,"_")+"_Shaw_Talent_Reference.pdf");
  document.getElementById("pdf-status").after(btn);
}

function showError(msg){ const e=document.getElementById("errorBox"); e.textContent=msg; e.style.display="block"; }
function clearError(){ document.getElementById("errorBox").style.display="none"; }
</script>
</body>
</html>
