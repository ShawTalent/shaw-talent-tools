<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaw Talent – Cover Sheet Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f6f7;color:#404040}
  .header{background:white;border-bottom:3px solid #29ABE2;padding:14px 36px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:16px}
  .header-logo{height:46px}
  .header-divider{border-left:1px solid #e2e8f0;padding-left:16px}
  .header-title{font-size:15px;font-weight:700;color:#404040}
  .header-sub{font-size:12px;color:#94a3b8}
  .container{max-width:1140px;margin:0 auto;padding:28px 24px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .card{background:white;border-radius:10px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .step-label{font-size:14px;font-weight:700;color:#404040;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .step-num{width:26px;height:26px;background:#29ABE2;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0}
  .step-num.grey{background:#94a3b8}
  textarea,input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;line-height:1.6;background:#fafbfc;color:#404040;outline:none;transition:border-color .15s;resize:vertical}
  textarea:focus,input:focus{border-color:#29ABE2}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0 10px}
  .divider-line{flex:1;height:1px;background:#e2e8f0}
  .divider-text{font-size:11px;color:#94a3b8;font-weight:600}
  .char-count{margin-top:6px;font-size:11px;color:#94a3b8}
  .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 16px;color:#dc2626;font-size:13px;margin-top:4px}
  .btn{width:100%;padding:15px 24px;font-size:14px;font-weight:700;border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s}
  .btn-blue{background:#29ABE2;color:white}
  .btn-blue:hover{background:#1a9fd4}
  .btn-blue:disabled{background:#cbd5e1;cursor:not-allowed}
  .btn-outline{background:none;color:#94a3b8;border:1px solid #e2e8f0;border-radius:8px;padding:8px 24px;font-size:12px;cursor:pointer;width:100%}
  .placeholder-panel{background:white;border-radius:10px;padding:48px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;text-align:center}
  .placeholder-icon{font-size:44px;margin-bottom:16px}
  .placeholder-text{color:#94a3b8;font-size:14px;line-height:1.7}
  .result-panel{background:white;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid #e2e8f0}
  .tab{flex:1;padding:12px 16px;border:none;background:none;font-size:13px;font-weight:700;cursor:pointer;color:#64748b;border-bottom:2.5px solid transparent;transition:all .15s}
  .tab.active{color:#29ABE2;border-bottom-color:#29ABE2}
  .tab-new{padding:12px 16px;border:none;background:none;font-size:13px;color:#94a3b8;cursor:pointer}
  .preview-body{padding:24px;max-height:600px;overflow-y:auto}
  .pdf-body{padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;min-height:200px;justify-content:center}
  .info-box{background:#f8fafc;border-left:3px solid #29ABE2;padding:12px 16px;border-radius:4px;margin-bottom:16px}
  .info-row{display:flex;gap:8px;margin-bottom:5px}
  .info-label{font-weight:700;min-width:150px;font-size:13px;color:#404040}
  .info-value{font-size:13px;color:#374151}
  .fit-box{background:#eef8fd;border-left:3px solid #29ABE2;padding:12px 16px;border-radius:4px;margin-bottom:16px}
  .fit-title{font-size:11px;font-weight:700;color:#29ABE2;margin-bottom:6px;letter-spacing:.05em}
  .fit-text{font-size:13px;line-height:1.7}
  .section{margin-bottom:14px}
  .section-title{font-weight:700;font-size:12px;border-bottom:1.5px solid #29ABE2;padding-bottom:3px;margin-bottom:8px}
  .section-item{font-size:13px;line-height:1.7;margin-bottom:4px;padding-left:12px}
  .dropzone{border:2px dashed #cbd5e1;border-radius:10px;padding:24px 20px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .15s}
  .dropzone:hover,.dropzone.drag{border-color:#29ABE2;background:#f0f9ff}
  .dropzone-icon{font-size:34px;margin-bottom:8px}
  .dropzone-title{font-size:14px;font-weight:600;color:#404040}
  .dropzone-sub{font-size:12px;color:#94a3b8}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:bounce 1.2s ease-in-out infinite}
  .loading-dots{display:inline-flex;gap:4px;align-items:center}
</style>
</head>

// ── Dropzone ──
function handleDragOver(e) { e.preventDefault(); document.getElementById("dropzone").classList.add("drag"); }
function handleDragLeave() { document.getElementById("dropzone").classList.remove("drag"); }
function handleDrop(e) { e.preventDefault(); document.getElementById("dropzone").classList.remove("drag"); const f = e.dataTransfer.files[0]; if(f) processFile(f); }
function handleFile(e) { const f = e.target.files[0]; if(f) processFile(f); }

async function processFile(file) {
  const dz = document.getElementById("dropzone-content");
  dz.innerHTML = `<div class="loading-dots"><span class="dot" style="background:#29ABE2;animation-delay:0s"></span><span class="dot" style="background:#29ABE2;animation-delay:.2s"></span><span class="dot" style="background:#29ABE2;animation-delay:.4s"></span></div><div style="font-size:13px;color:#64748b;margin-top:8px">Reading CV...</div>`;
  try {
    if (file.name.endsWith(".txt")) {
      document.getElementById("cvText").value = await file.text();
    } else {
      if (!window.pdfjsLib) throw new Error("PDF.js not loaded");
      const pdf = await pdfjsLib.getDocument({data: await file.arrayBuffer()}).promise;
      let text = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        text += tc.items.map(x => x.str).join(" ") + "\n";
      }
      document.getElementById("cvText").value = text.trim();
    }
    updateCharCount();
    dz.innerHTML = `<div style="font-size:26px">✅</div><div style="font-size:13px;font-weight:600;color:#404040;margin-top:4px">${file.name}</div><div style="font-size:12px;color:#94a3b8">Click to replace</div>`;
  } catch(e) {
    dz.innerHTML = `<div class="dropzone-icon">📄</div><div class="dropzone-title">Drop CV here</div><div class="dropzone-sub">or click to browse · PDF or TXT</div>`;
    showError("Could not read file: " + e.message);
  }
}

function updateCharCount() {
  const t = document.getElementById("cvText").value;
  const el = document.getElementById("charCount");
  if (t.length > 0) { el.style.display = "block"; el.textContent = "✓ " + t.length.toLocaleString() + " characters"; }
  else el.style.display = "none";
}
document.getElementById("cvText").addEventListener("input", updateCharCount);

// ── Generate ──
async function generate() {
  const cv = document.getElementById("cvText").value.trim();
  const ctx = document.getElementById("context").value.trim();
  if (!cv) { showError("Please upload or paste a CV first."); return; }

  clearError();
  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerHTML = `<span class="loading-dots"><span class="dot" style="background:white;animation-delay:0s"></span><span class="dot" style="background:white;animation-delay:.2s"></span><span class="dot" style="background:white;animation-delay:.4s"></span></span> Generating cover sheet...`;

  document.getElementById("rightPanel").innerHTML = `
    <div class="placeholder-panel">
      <div class="loading-dots" style="margin-bottom:16px"><span class="dot" style="background:#29ABE2;animation-delay:0s"></span><span class="dot" style="background:#29ABE2;animation-delay:.2s"></span><span class="dot" style="background:#29ABE2;animation-delay:.4s"></span></div>
      <div style="color:#94a3b8;font-size:14px">Generating cover sheet...</div>
    </div>`;

  const userMsg = "CV / Resume:\n" + cv + (ctx ? "\n\nAdditional Context & Transcript:\n" + ctx : "");

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: SYSTEM_PROMPT, messages: [{ role: "user", content: userMsg }], max_tokens: 4000 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "API error " + res.status);
    const text = (data.content || []).map(b => b.text || "").join("").trim();
    if (!text) throw new Error("Empty response from API");
    const clean = text.replace(/^```json\s*/,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
    currentResult = JSON.parse(clean);
    renderResult();
  } catch(e) {
    showError("Error: " + e.message);
    document.getElementById("rightPanel").innerHTML = `<div class="placeholder-panel"><div class="placeholder-icon">❌</div><div class="placeholder-text">${e.message}</div></div>`;
  }

  btn.disabled = false;
  btn.innerHTML = "Generate Cover Sheet →";
}

// ── Render preview ──
function renderResult() {
  const r = currentResult;
  document.getElementById("rightPanel").innerHTML = `
    <div class="result-panel">
      <div class="tabs">
        <button class="tab active" id="tab-preview" onclick="switchTab('preview')">Preview</button>
        <button class="tab" id="tab-pdf" onclick="switchTab('pdf')">⬇ Download PDF</button>
        <button class="tab-new" onclick="resetTool()">New</button>
      </div>
      <div id="tab-content-preview" class="preview-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <h2 style="font-size:22px;font-weight:800">${r.name}</h2>
            <div style="color:#29ABE2;font-weight:700;font-size:13px;margin-top:4px">${r.currentTitle} — ${r.currentEmployer}</div>
          </div>
          <img src="data:image/jpeg;base64,${LOGO_B64}" style="height:40px">
        </div>
        <div class="info-box">
          ${[["Location",r.location],["Current Salary",r.currentSalary],["Desired Salary",r.desiredSalary],["Desired Position",r.desiredPosition],["Notice Period",r.noticePeriod],["Work Rights",r.workRights],["Presented by","Martin Smallshaw"]].map(([l,v])=>`<div class="info-row"><span class="info-label">${l}:</span><span class="info-value">${v||""}</span></div>`).join("")}
        </div>
        <div class="fit-box">
          <div class="fit-title">WHY THIS CANDIDATE</div>
          <div class="fit-text">${r.fitSummary||""}</div>
        </div>
        ${[["PROFESSIONAL SUMMARY",r.professionalSummary],["KEY STRENGTHS & TECHNICAL EXPERTISE",r.keyStrengths],["QUALIFICATIONS & PROFESSIONAL MEMBERSHIPS",r.qualifications]].map(([t,items])=>`
          <div class="section">
            <div class="section-title">${t}</div>
            ${(items||[]).map(item=>`<div class="section-item">• ${item.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")}</div>`).join("")}
          </div>`).join("")}
      </div>
      <div id="tab-content-pdf" style="display:none" class="pdf-body">
        <div style="font-size:13px;color:#64748b;text-align:center;margin-bottom:8px">Click to generate a downloadable PDF</div>
        <button class="btn btn-blue" style="width:auto;padding:12px 32px" onclick="buildPdf()">Build PDF</button>
        <div id="pdf-status" style="font-size:13px;color:#64748b;margin-top:8px"></div>
      </div>
    </div>`;
}

function switchTab(tab) {
  document.getElementById("tab-preview").classList.toggle("active", tab==="preview");
  document.getElementById("tab-pdf").classList.toggle("active", tab==="pdf");
  document.getElementById("tab-content-preview").style.display = tab==="preview" ? "block" : "none";
  document.getElementById("tab-content-pdf").style.display = tab==="pdf" ? "flex" : "none";
}

function resetTool() {
  currentResult = null;
  document.getElementById("cvText").value = "";
  document.getElementById("context").value = "";
  document.getElementById("charCount").style.display = "none";
  document.getElementById("dropzone-content").innerHTML = `<div class="dropzone-icon">📄</div><div class="dropzone-title">Drop CV here</div><div class="dropzone-sub">or click to browse · PDF or TXT</div>`;
  document.getElementById("rightPanel").innerHTML = `<div class="placeholder-panel"><div class="placeholder-icon">📋</div><div class="placeholder-text">Upload or paste a CV and click<br>Generate to preview the cover sheet</div></div>`;
  clearError();
}

// ── PDF Builder ──
let builtDoc = null;

function titleCase(raw) {
  return raw.replace(/\S+/g, w => {
    const u = w.toUpperCase();
    return (ACRONYMS.has(u) || ACRONYMS.has(w)) ? u : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  });
}

async function buildPdf() {
  const status = document.getElementById("pdf-status");
  status.textContent = "Building PDF...";

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210,H=297,ml=16,mr=16,cW=W-ml-mr;
  const bl=[41,171,226],dk=[64,64,64],md=[100,100,100];
  const r = currentResult;
  let y = 14;

  try { doc.addImage("data:image/jpeg;base64,"+LOGO_B64,"JPEG",W-mr-38,6,38,27); } catch(e){}

  doc.setFont("helvetica","bold"); doc.setFontSize(18); doc.setTextColor(...dk);
  doc.text(r.name, ml, y+7);
  doc.setFontSize(11); doc.setTextColor(...bl);
  doc.text(`${r.currentTitle} — ${r.currentEmployer}`, ml, y+14);
  y += 26;

  doc.setFillColor(248,250,252); doc.roundedRect(ml,y,cW,34,2,2,"F");
  doc.setFillColor(...bl); doc.rect(ml,y,3,34,"F");
  const rows=[["Location",r.location],["Current Salary",r.currentSalary],["Desired Salary",r.desiredSalary],["Desired Position",r.desiredPosition],["Notice Period",r.noticePeriod],["Presented by","Martin Smallshaw"]];
  const x1=ml+6,x2=ml+cW/2+2,lw=30;
  let iy=y+6;
  rows.slice(0,3).forEach(([l,v])=>{ doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...dk); doc.text(l+":",x1,iy); doc.setFont("helvetica","normal"); doc.setTextColor(...md); doc.text(doc.splitTextToSize(String(v||""),cW/2-lw-8)[0],x1+lw,iy); iy+=6; });
  iy=y+6;
  rows.slice(3).forEach(([l,v])=>{ doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...dk); doc.text(l+":",x2,iy); doc.setFont("helvetica","normal"); doc.setTextColor(...md); doc.text(doc.splitTextToSize(String(v||""),cW/2-lw-8)[0],x2+lw,iy); iy+=6; });
  y+=38;

  doc.setDrawColor(...bl); doc.setLineWidth(0.8); doc.line(ml,y,W-mr,y); y+=5;

  const fitLines=doc.splitTextToSize(r.fitSummary||"",cW-14);
  const fitH=fitLines.length*5.2+14;
  doc.setFillColor(238,248,253); doc.roundedRect(ml,y,cW,fitH,2,2,"F");
  doc.setFillColor(...bl); doc.rect(ml,y,3,fitH,"F");
  doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(...bl);
  doc.text("WHY THIS CANDIDATE",ml+6,y+5);
  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(55,65,81);
  doc.text(fitLines,ml+6,y+11);
  y+=fitH+6;

  function secTitle(t){ doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(...dk); doc.text(t,ml,y); doc.setDrawColor(...bl); doc.setLineWidth(0.5); doc.line(ml,y+1.5,W-mr,y+1.5); y+=6; }
  function bullets(items){ doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(55,65,81); items.forEach(item=>{ const ls=doc.splitTextToSize("• "+item,cW-4); doc.text(ls,ml+2,y); y+=ls.length*4.8; }); y+=2; }

  secTitle("PROFESSIONAL SUMMARY");
  bullets(r.professionalSummary||[]);

  secTitle("KEY STRENGTHS & TECHNICAL EXPERTISE");
  const str=r.keyStrengths||[];
  const half=Math.ceil(str.length/2);
  const colW=(cW-8)/2;
  const sy=y;

  function renderStr(s,x,cy,mW){
    const m=s.match(/^\*\*(.+?)\*\*\s*(.*)$/);
    doc.setTextColor(55,65,81);
    if(m){
      const label=titleCase(m[1]),rest=m[2];
      doc.setFont("helvetica","bold"); doc.setFontSize(9);
      const bw=doc.getTextWidth("• ");
      const lw2=doc.getTextWidth(label+" ");
      const remW=mW-bw-lw2;
      const descW=mW-bw;
      const line1=remW>15?doc.splitTextToSize(rest,remW):[];
      const first=line1[0]||"";
      doc.text("• "+label+" ",x,cy);
      if(first){ doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.text(first,x+bw+lw2,cy); }
      cy+=4.8;
      const rem=first?rest.slice(first.length).trim():rest;
      if(rem){ doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.splitTextToSize(rem,descW).forEach(l=>{ doc.text(l,x+bw,cy); cy+=4.8; }); }
      return cy+2;
    } else {
      doc.setFont("helvetica","normal"); doc.setFontSize(9);
      const ls=doc.splitTextToSize("• "+s,mW);
      ls.forEach((l,i)=>{ doc.text(l,i===0?x:x+3,cy); cy+=4.8; });
      return cy+2;
    }
  }

  let ly1=sy,ly2=sy;
  str.slice(0,half).forEach(s=>{ ly1=renderStr(s,ml+2,ly1,colW); });
  str.slice(half).forEach(s=>{ ly2=renderStr(s,ml+colW+10,ly2,colW); });
  y=Math.max(ly1,ly2)+4;

  secTitle("QUALIFICATIONS & PROFESSIONAL MEMBERSHIPS");
  bullets(r.qualifications||[]);

  doc.setDrawColor(226,232,240); doc.setLineWidth(0.3); doc.line(ml,H-12,W-mr,H-12);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(148,163,184);
  doc.text("Shaw Talent  —  shawtalent.com.au",ml,H-7);
  doc.text("Confidential",W-mr,H-7,{align:"right"});

  builtDoc = doc;
  status.innerHTML = `<span style="color:#22c55e;font-weight:600">✅ PDF ready</span>`;

  const downloadBtn = document.createElement("button");
  downloadBtn.className = "btn btn-blue";
  downloadBtn.style.cssText = "width:100%;margin-top:8px";
  downloadBtn.textContent = "⬇ Save PDF to Desktop";
  downloadBtn.onclick = () => builtDoc.save(currentResult.name.replace(/\s+/g,"_") + "_Shaw_Talent.pdf");
  document.getElementById("pdf-status").after(downloadBtn);
}

function showError(msg) { const e = document.getElementById("errorBox"); e.textContent = msg; e.style.display = "block"; }
function clearError() { document.getElementById("errorBox").style.display = "none"; }
</script>
